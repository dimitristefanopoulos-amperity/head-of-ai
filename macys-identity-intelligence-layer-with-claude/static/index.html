<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Macys Identity Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --amp-dusk: #1A1A1A; --amp-dark: #111111; --amp-teal: #54D3DE;
  --amp-ocean: #00A0B2; --amp-yellow: #EAFF5F; --amp-cloud: #FFFFFF;
  --amp-white: #FFFFFF; --amp-red: #EF4444; --amp-orange: #F59E0B;
  --amp-green: #10B981; --amp-anvil: #6B7280; --amp-border: #E5E7EB;
  --amp-cement: #9CA3AF; --amp-ice: #F0FAFB;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:#F8F9FA; color:#1a1a1a; min-height:100vh; }

/* Header */
.header { background:var(--amp-dusk); padding:0 32px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-text { color:var(--amp-white); font-weight:700; font-size:18px; letter-spacing:-0.3px; }
.logo-amp { color:var(--amp-teal); }
.header-right { display:flex; align-items:center; gap:16px; }
.nav-link { color:rgba(255,255,255,0.5); text-decoration:none; font-size:12px; font-weight:600; padding:7px 16px; border-radius:4px; transition:all 0.2s; letter-spacing:0.3px; text-transform:uppercase; }
.nav-link:hover { color:var(--amp-white); }
.nav-link.active { color:var(--amp-dusk); background:var(--amp-teal); }

/* Region Switcher */
.region-switcher { display:flex; gap:4px; background:rgba(255,255,255,0.06); border-radius:8px; padding:3px; }
.region-btn { padding:5px 14px; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; background:transparent; color:rgba(255,255,255,0.5); font-family:inherit; }
.region-btn.active { background:var(--amp-ocean); color:var(--amp-white); }
.region-btn:hover:not(.active) { color:var(--amp-white); background:rgba(255,255,255,0.08); }
.region-btn .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; }
.dot-ok { background:var(--amp-green); }
.dot-fail { background:var(--amp-red); }

/* Main */
.main { max-width:1200px; margin:0 auto; padding:32px 24px; }
.search-section { text-align:center; margin-bottom:32px; }
.search-title { font-size:28px; font-weight:700; color:var(--amp-dusk); margin-bottom:4px; font-family:'Montserrat',system-ui,sans-serif; }
.search-subtitle { font-size:14px; color:var(--amp-anvil); margin-bottom:20px; }
.search-bar { display:flex; max-width:640px; margin:0 auto; }
.search-input { flex:1; padding:12px 16px; border:2px solid var(--amp-border); border-right:none; border-radius:8px 0 0 8px; font-size:15px; font-family:inherit; outline:none; transition:border-color 0.15s; }
.search-input:focus { border-color:var(--amp-teal); }
.search-btn { padding:12px 24px; background:var(--amp-teal); color:var(--amp-dusk); border:2px solid var(--amp-teal); border-radius:0 8px 8px 0; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit; transition:background 0.15s; }
.search-btn:hover { background:var(--amp-ocean); border-color:var(--amp-ocean); }
.search-hint { font-size:12px; color:var(--amp-anvil); margin-top:8px; }

/* Results */
.results { margin-top:24px; }
.result-card { background:var(--amp-white); border-radius:10px; padding:16px 20px; margin-bottom:10px; cursor:pointer; border:1px solid var(--amp-border); transition:all 0.15s; display:flex; justify-content:space-between; align-items:center; }
.result-card:hover { border-color:var(--amp-teal); box-shadow:0 2px 8px rgba(0,194,183,0.12); }
.result-name { font-weight:600; font-size:15px; }
.result-meta { font-size:13px; color:var(--amp-anvil); margin-top:2px; }
.result-ampid { font-size:11px; color:var(--amp-ocean); font-family:'SF Mono',monospace; }
.result-arrow { color:var(--amp-teal); font-size:18px; }
.loading { text-align:center; padding:40px; color:var(--amp-anvil); }
.no-results { text-align:center; padding:40px; color:var(--amp-anvil); font-size:14px; }
.error { text-align:center; padding:20px; color:var(--amp-red); background:#FEF2F2; border-radius:8px; font-size:14px; }

/* Explain Panel */
.explain-panel { background:var(--amp-white); border-radius:12px; border:1px solid var(--amp-border); overflow:hidden; }
.explain-header { background:var(--amp-dusk); color:var(--amp-white); padding:20px 24px; }
.explain-header h2 { font-size:18px; font-weight:600; font-family:'Montserrat',system-ui,sans-serif; }
.explain-header .ampid { font-size:12px; color:var(--amp-teal); font-family:monospace; margin-top:4px; }
.explain-back { color:var(--amp-teal); cursor:pointer; font-size:13px; margin-bottom:8px; display:inline-block; }
.explain-body { padding:24px; }

/* Confidence */
.confidence-ring { display:flex; align-items:center; gap:20px; margin-bottom:24px; padding:16px; background:var(--amp-cloud); border-radius:10px; }
.conf-score { font-size:48px; font-weight:700; line-height:1; }
.conf-label { font-size:14px; font-weight:600; margin-top:2px; }
.conf-components { flex:1; }
.comp-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; }
.comp-bar-label { width:120px; font-weight:500; }
.comp-bar-track { flex:1; height:8px; background:#E5E7EB; border-radius:4px; overflow:hidden; }
.comp-bar-fill { height:100%; border-radius:4px; transition:width 0.6s ease; }
.comp-bar-pts { width:50px; text-align:right; font-weight:600; font-size:11px; }

/* Narrative */
.narrative { background:var(--amp-ice); border-left:3px solid var(--amp-ocean); padding:14px 18px; font-size:14px; line-height:1.6; color:var(--amp-dusk); margin-bottom:24px; border-radius:0 8px 8px 0; }

/* Sections */
.section-title { font-size:15px; font-weight:700; color:var(--amp-dusk); margin:20px 0 10px; border-bottom:2px solid var(--amp-cloud); padding-bottom:6px; }
.signal-list { list-style:none; }
.signal-item { padding:8px 12px; background:var(--amp-cloud); border-radius:6px; margin-bottom:4px; font-size:13px; display:flex; justify-content:space-between; }
.signal-strong { border-left:3px solid var(--amp-green); }
.signal-moderate { border-left:3px solid var(--amp-orange); }
.badge { padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.badge-strong { background:#D1FAE5; color:#065F46; }
.badge-moderate { background:#FEF3C7; color:#92400E; }
.badge-high { background:#FEE2E2; color:#991B1B; }
.badge-low { background:#E0F2FE; color:#075985; }
.badge-medium { background:#FEF3C7; color:#92400E; }

/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
.data-table th { background:var(--amp-dusk); color:var(--amp-white); padding:8px 10px; text-align:left; font-weight:600; position:sticky; top:0; }
.data-table td { padding:7px 10px; border-bottom:1px solid var(--amp-border); }
.data-table tr:hover td { background:#F9FAFB; }
.table-scroll { max-height:400px; overflow-y:auto; border-radius:8px; border:1px solid var(--amp-border); }

/* Penalties */
.penalty { background:#FEF2F2; border-left:3px solid var(--amp-red); padding:8px 12px; font-size:13px; color:#991B1B; margin-bottom:4px; border-radius:0 6px 6px 0; }

/* Diagnosis & Recommendations */
.diagnosis-section { margin:20px 0; }
.diagnosis-card { padding:14px 18px; border-radius:8px; margin-bottom:8px; font-size:13px; line-height:1.5; }
.diagnosis-card.critical { background:#FEF2F2; border-left:4px solid #DC2626; color:#7F1D1D; }
.diagnosis-card.high { background:#FFFBEB; border-left:4px solid #F59E0B; color:#78350F; }
.diagnosis-card.none { background:#ECFDF5; border-left:4px solid #10B981; color:#064E3B; }
.diagnosis-title { font-weight:700; font-size:14px; margin-bottom:4px; }
.recommendation { background:var(--amp-ice); border:1px solid var(--amp-border); border-left:4px solid var(--amp-ocean); padding:12px 16px; border-radius:0 8px 8px 0; margin-bottom:8px; font-size:13px; line-height:1.5; }
.recommendation .rec-action { font-weight:700; color:var(--amp-dusk); margin-bottom:4px; }
.recommendation .rec-detail { color:var(--amp-anvil); }
.recommendation .rec-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; text-transform:uppercase; margin-left:8px; }
.rec-badge.priority-1 { background:#FEE2E2; color:#DC2626; }
.rec-badge.priority-2 { background:#FEF3C7; color:#D97706; }</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="https://amperity-static-assets.s3-us-west-2.amazonaws.com/resources/img/amp_logo_white.svg" alt="Amperity" style="height:24px;">
    <span style="color:rgba(255,255,255,0.4);font-size:13px;margin-left:4px;">Identity Intelligence — Macys</span>
  </div>
  <div class="header-right">
    <div class="region-switcher" id="regionSwitcher"></div>
    <a href="/" class="nav-link active">Search</a>
    <a href="/tools" class="nav-link">Data Quality</a>
    <a href="/cotm" class="nav-link">Value View</a>
    <a href="/demo" class="nav-link">Demo</a>
    <a href="/presentation" class="nav-link">Presentation</a>
    <a href="/deck" class="nav-link">Deck</a>
    <a href="/ai" class="nav-link">AI</a>
  </div>
</div>

<div class="main">
  <div id="searchView">
    <div class="search-section">
      <div class="search-title">Identity Intelligence</div>
      <div class="search-subtitle">Search by name, email, phone, or Amperity ID</div>
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="e.g. John Smith, john@gm.com, or paste an AMPID..." autofocus>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
      <div class="search-hint">Tip: Search by name, email, phone, or Amperity ID</div>
    </div>
    <div id="results" class="results"></div>
  </div>

  <div id="explainView" style="display:none"></div>
</div>

<script>
const $ = s => document.querySelector(s);
let currentRegion = null;

// ── Region Switcher ──
async function loadRegions() {
  try {
    const r = await fetch('/api/regions');
    const d = await r.json();
    currentRegion = d.active;
    const sw = $('#regionSwitcher');
    sw.innerHTML = d.regions.map(r => `
      <button class="region-btn ${r.active ? 'active' : ''}" data-id="${r.id}">
        <span class="dot ${r.has_token ? 'dot-ok' : 'dot-fail'}"></span>${r.name}
      </button>
    `).join('');
    sw.querySelectorAll('.region-btn').forEach(btn => {
      btn.onclick = async () => {
        await fetch(`/api/regions/${btn.dataset.id}/activate`, {method:'POST'});
        loadRegions();
        $('#results').innerHTML = '';
      };
    });
  } catch(e) {
    $('#regionSwitcher').innerHTML = '<span style="color:#EF4444;font-size:12px">No regions</span>';
  }
}

// ── Search ──
async function doSearch() {
  const q = $('#searchInput').value.trim();
  if (!q) return;
  $('#results').innerHTML = '<div class="loading">Searching...</div>';
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (d.error) { $('#results').innerHTML = `<div class="error">${d.error}</div>`; return; }
    if (!d.results || d.results.length === 0) { $('#results').innerHTML = '<div class="no-results">No results found</div>'; return; }

    // Dedupe by amperity_id for display
    const seen = new Set();
    const unique = d.results.filter(r => {
      const id = r.amperity_id;
      if (seen.has(id)) return false;
      seen.add(id);
      return true;
    });

    $('#results').innerHTML = unique.map(r => `
      <div class="result-card" onclick="showExplain('${r.amperity_id}')">
        <div>
          <div class="result-name">${r.given_name || ''} ${r.surname || ''}</div>
          <div class="result-meta">${r.email || ''} ${r.phone ? '· '+r.phone : ''} ${r.city ? '· '+r.city : ''} ${r.state ? ', '+r.state : ''}</div>
          <div class="result-ampid">${r.amperity_id}</div>
        </div>
        <div class="result-arrow">→</div>
      </div>
    `).join('');
  } catch(e) {
    $('#results').innerHTML = `<div class="error">${e.message}</div>`;
  }
}

$('#searchBtn').onclick = doSearch;
$('#searchInput').onkeydown = e => { if (e.key === 'Enter') doSearch(); };

// ── Explain ──
async function showExplain(ampid) {
  $('#searchView').style.display = 'none';
  const ev = $('#explainView');
  ev.style.display = 'block';
  ev.innerHTML = '<div class="loading" style="padding:60px">Loading cluster analysis...</div>';

  try {
    const r = await fetch(`/api/explain/${ampid}`);
    const d = await r.json();
    if (d.error) { ev.innerHTML = `<div class="error">${d.error}</div>`; return; }

    const cb = d.confidence_breakdown;
    const confColor = cb.score >= 85 ? 'var(--amp-green)' : cb.score >= 70 ? 'var(--amp-teal)' : cb.score >= 50 ? 'var(--amp-orange)' : 'var(--amp-red)';

    ev.innerHTML = `
      <div class="explain-panel">
        <div class="explain-header">
          <span class="explain-back" onclick="backToSearch()">← ${new URLSearchParams(window.location.search).get('from') ? 'Back to Dashboard' : 'Back to results'}</span>
          <h2>${d.records?.[0]?.given_name || ''} ${d.records?.[0]?.surname || ''} — ${d.record_count} records from ${d.source_count} sources</h2>
          <div class="ampid">${d.amperity_id} · Region: ${d.region || currentRegion}</div>
        </div>
        <div class="explain-body">

          <!-- Confidence -->
          <div class="confidence-ring">
            <div style="text-align:center">
              <div class="conf-score" style="color:${confColor}">${cb.score}</div>
              <div class="conf-label" style="color:${confColor}">${cb.label}</div>
            </div>
            <div class="conf-components">
              ${Object.entries(cb.components).map(([k,v]) => `
                <div class="comp-bar">
                  <span class="comp-bar-label">${k.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</span>
                  <div class="comp-bar-track">
                    <div class="comp-bar-fill" style="width:${(v.points/v.max)*100}%;background:${confColor}"></div>
                  </div>
                  <span class="comp-bar-pts">${v.points}/${v.max}</span>
                </div>
              `).join('')}
            </div>
          </div>

          ${cb.penalties_applied.length ? `
            <div class="section-title">Penalties Applied</div>
            ${cb.penalties_applied.map(p => `<div class="penalty">⚠ ${p}</div>`).join('')}
          ` : ''}

          <!-- Narrative -->
          <div class="narrative">${d.narrative}</div>

          <!-- Diagnosis & Recommendations -->
          ${d.diagnosis && d.diagnosis.diagnosis && d.diagnosis.diagnosis.length ? `
            <div class="diagnosis-section">
              <div class="section-title">Root Cause Analysis</div>
              ${d.diagnosis.diagnosis.map(diag => `
                <div class="diagnosis-card ${diag.severity}">
                  <div class="diagnosis-title">${diag.title}</div>
                  <div>${diag.detail}</div>
                </div>
              `).join('')}
            </div>
          ` : ''}

          ${d.diagnosis && d.diagnosis.recommendations && d.diagnosis.recommendations.length ? `
            <div class="diagnosis-section">
              <div class="section-title">Recommended Actions</div>
              ${d.diagnosis.recommendations.map(rec => `
                <div class="recommendation">
                  <div class="rec-action">${rec.action}<span class="rec-badge priority-${rec.priority}">P${rec.priority}</span></div>
                  <div class="rec-detail">${rec.detail}</div>
                </div>
              `).join('')}
            </div>
          ` : ''}

          <!-- Signals -->
          <div class="section-title">Identity Signals (${d.signals?.length || 0})</div>
          <ul class="signal-list">
            ${(d.signals || []).slice(0,12).map(s => `
              <li class="signal-item signal-${s.strength}">
                <span><strong>${s.field}</strong>: ${s.value} (${s.source_count} sources)</span>
                <span class="badge badge-${s.strength}">${s.strength}</span>
              </li>
            `).join('')}
          </ul>

          <!-- Variations -->
          ${(d.variations && d.variations.length) ? `
            <div class="section-title">Variations Detected</div>
            ${d.variations.map(v => `
              <div class="signal-item" style="border-left:3px solid ${v.severity==='high'?'var(--amp-red)':v.severity==='medium'?'var(--amp-orange)':'var(--amp-teal)'}">
                <span>${v.detail}</span>
                <span class="badge badge-${v.severity}">${v.severity}</span>
              </div>
            `).join('')}
          ` : ''}

          <!-- Score Stats -->
          ${d.score_stats && d.score_stats.count > 0 ? `
            <div class="section-title">Pairwise Scores (${d.score_stats.count} pairs)</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
              <div style="background:var(--amp-cloud);padding:12px;border-radius:8px;text-align:center">
                <div style="font-size:24px;font-weight:700;color:var(--amp-teal)">${d.score_stats.avg}</div>
                <div style="font-size:11px;color:var(--amp-anvil)">Avg Score</div>
              </div>
              <div style="background:var(--amp-cloud);padding:12px;border-radius:8px;text-align:center">
                <div style="font-size:24px;font-weight:700;color:${d.score_stats.min<3?'var(--amp-red)':'var(--amp-green)'}">${d.score_stats.min}</div>
                <div style="font-size:11px;color:var(--amp-anvil)">Min Score</div>
              </div>
              <div style="background:var(--amp-cloud);padding:12px;border-radius:8px;text-align:center">
                <div style="font-size:24px;font-weight:700">${d.score_stats.direct_pairs}</div>
                <div style="font-size:11px;color:var(--amp-anvil)">Direct Links</div>
              </div>
              <div style="background:var(--amp-cloud);padding:12px;border-radius:8px;text-align:center">
                <div style="font-size:24px;font-weight:700;color:${d.score_stats.transitive_ratio>0.7?'var(--amp-orange)':'inherit'}">${d.score_stats.transitive_pairs}</div>
                <div style="font-size:11px;color:var(--amp-anvil)">Transitive</div>
              </div>
            </div>
            ${d.score_stats.by_category ? `
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
                ${Object.entries(d.score_stats.by_category).map(([cat,cnt]) => `
                  <span style="padding:4px 10px;background:var(--amp-cloud);border-radius:4px;font-size:12px;font-weight:500">${cat}: ${cnt}</span>
                `).join('')}
              </div>
            ` : ''}
          ` : ''}

          <!-- Field Completeness -->
          <div class="section-title">Field Completeness</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
            ${Object.entries(d.field_completeness || {}).map(([f,pct]) => `
              <div style="font-size:12px">
                <div style="display:flex;justify-content:space-between;margin-bottom:2px">
                  <span style="font-weight:500">${f}</span><span>${pct}%</span>
                </div>
                <div style="height:4px;background:#E5E7EB;border-radius:2px">
                  <div style="height:100%;width:${pct}%;background:${pct>80?'var(--amp-green)':pct>50?'var(--amp-orange)':'var(--amp-red)'};border-radius:2px"></div>
                </div>
              </div>
            `).join('')}
          </div>

          <!-- Source Records Table -->
          <div class="section-title">Source Records</div>
          <div class="table-scroll">
            <table class="data-table">
              <thead><tr><th>Source</th><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>State</th></tr></thead>
              <tbody>
                ${(d.records || []).map(r => `
                  <tr>
                    <td style="font-weight:500;white-space:nowrap">${d.sources?.[r.datasource] || r.datasource || ''}</td>
                    <td>${r.given_name||''} ${r.surname||''}</td>
                    <td style="font-size:11px">${r.email||''}</td>
                    <td style="font-size:11px">${r.phone||''}</td>
                    <td>${r.city||''}</td>
                    <td>${r.state||''}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>

        </div>
      </div>
    `;
  } catch(e) {
    ev.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function backToSearch() {
  // If we came from the dashboard, go back there (to the right tab)
  const from = new URLSearchParams(window.location.search).get('from');
  if (from === 'cotm') {
    window.location.href = '/cotm';
    return;
  }
  if (from === 'demo') {
    window.location.href = '/demo';
    return;
  }
  if (from === 'presentation') {
    window.location.href = '/presentation';
    return;
  }
  if (from) {
    window.location.href = `/tools#${from}`;
    return;
  }
  $('#explainView').style.display = 'none';
  $('#searchView').style.display = 'block';
}

// ── Init ──
loadRegions();

// Auto-load from URL params: /?explain=ampid or /?search=query
const params = new URLSearchParams(window.location.search);
if (params.get('explain')) {
  showExplain(params.get('explain'));
} else if (params.get('search')) {
  $('#searchInput').value = params.get('search');
  doSearch();
}
</script>
</body>
</html>
